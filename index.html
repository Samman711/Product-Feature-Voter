<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NextGen Feature Roadmap</title>
    <meta name="description" content="Vote and submit your favorite features for our next release.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-container">
        <!-- Canvas for scroll-based frame animation -->
        <canvas id="scroll-canvas" class="bg-canvas"></canvas>
        <div class="bg-overlay" id="bg-overlay"></div>
    </div>

    <header class="app-header">
        <div class="header-content">
            <h1>Feature Roadmap</h1>
            <p>Help us prioritize what's next.</p>
        </div>
        <form id="add-feature-form" class="add-feature-form">
            <input type="text" id="feature-title" placeholder="Feature Title" required>
            <input type="text" id="feature-desc" placeholder="Short description..." required>
            <input type="text" id="feature-details" placeholder="More info... (optional)">
            <button type="submit" class="submit-btn">
                <span>Add Feature</span>
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
        </form>
    </header>

    <main class="features-container" id="features-container">
        <!-- Dynamic features will be inserted here -->
    </main>

    <script src="script.js"></script>
</body>
</html>
