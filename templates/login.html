<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Sign In | Insight Curator</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-variant": "#e0e3e5",
                        "surface-container": "#eceef0",
                        ...tailwind.config, // omitted long setup here for brevity if it complains, but let's just do it cleanly
                        "primary": "#006591",
                        "primary-container": "#0ea5e9",
                        "on-primary": "#ffffff",
                        "surface": "#f7f9fb",
                        "on-surface": "#191c1e",
                        "surface-container-low": "#f2f4f6",
                        "surface-container-lowest": "#ffffff",
                        "on-surface-variant": "#3e4850",
                        "outline": "#6e7881",
                        "outline-variant": "#bec8d2"
                    },
                    "fontFamily": {
                        "body": ["Inter"],
                    }
                },
            },
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f7f9fb; }
        .hidden-auth { display: none; }
    </style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center py-12 px-4 sm:px-6 lg:px-8">

    <div class="w-full max-w-md space-y-8">
        <div class="text-center">
            <a href="/" class="text-2xl font-bold tracking-tighter text-sky-900 mx-auto">Insight Curator</a>
        </div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <div class="bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
                    <p class="text-red-700 text-sm font-medium">{{ messages[0] }}</p>
                </div>
            {% endif %}
        {% endwith %}

        <!-- Sign In Form -->
        <div id="login-form-container" class="bg-surface-container-lowest p-8 rounded-2xl shadow-lg border border-outline-variant/30">
            <h2 class="text-2xl font-bold text-on-surface mb-2">Welcome back</h2>
            <p class="text-sm text-on-surface-variant mb-8">Sign in to upvote and track your feature requests.</p>
            
            <form class="space-y-6" action="/login" method="POST">
                <div>
                    <label for="username" class="sr-only">Username</label>
                    <input id="username" name="username" type="text" required class="w-full px-4 py-3 rounded-lg border border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline text-sm" placeholder="Username">
                </div>
                <div>
                    <label for="password" class="sr-only">Password</label>
                    <input id="password" name="password" type="password" required class="w-full px-4 py-3 rounded-lg border border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline text-sm" placeholder="Password">
                </div>
                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary hover:bg-sky-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors">
                    Sign In
                </button>
            </form>
            <div class="mt-6 text-center text-sm">
                <span class="text-on-surface-variant">Don't have an account?</span>
                <button type="button" onclick="toggleForms()" class="font-semibold text-primary hover:text-sky-700">Sign Up</button>
            </div>
        </div>

        <!-- Register Form -->
        <div id="register-form-container" class="hidden-auth bg-surface-container-lowest p-8 rounded-2xl shadow-lg border border-outline-variant/30">
            <h2 class="text-2xl font-bold text-on-surface mb-2">Create an Account</h2>
            <p class="text-sm text-on-surface-variant mb-8">Join the community and prioritize features.</p>
            
            <form class="space-y-5" action="/register" method="POST">
                <div>
                    <label for="reg-name" class="sr-only">Full Name</label>
                    <input id="reg-name" name="name" type="text" required class="w-full px-4 py-3 rounded-lg border border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline text-sm" placeholder="Full Name">
                </div>
                <div>
                    <label for="reg-username" class="sr-only">Username</label>
                    <input id="reg-username" name="username" type="text" required class="w-full px-4 py-3 rounded-lg border border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline text-sm" placeholder="Username">
                </div>
                <div>
                    <label for="reg-email" class="sr-only">Email address</label>
                    <input id="reg-email" name="email" type="email" required class="w-full px-4 py-3 rounded-lg border border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline text-sm" placeholder="Email Address">
                </div>
                <div>
                    <label for="reg-password" class="sr-only">Password</label>
                    <input id="reg-password" name="password" type="password" required class="w-full px-4 py-3 rounded-lg border border-outline-variant/50 focus:border-primary focus:ring-1 focus:ring-primary outline-none transition-all placeholder:text-outline text-sm" placeholder="Password">
                </div>
                <button type="submit" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary hover:bg-sky-800 focus:outline-none transition-colors">
                    Create Account
                </button>
            </form>
            <div class="mt-6 text-center text-sm">
                <span class="text-on-surface-variant">Already registered?</span>
                <button type="button" onclick="toggleForms()" class="font-semibold text-primary hover:text-sky-700">Sign In instead</button>
            </div>
        </div>
    </div>

    <script>
        function toggleForms() {
            const login = document.getElementById('login-form-container');
            const register = document.getElementById('register-form-container');
            
            if (login.classList.contains('hidden-auth')) {
                login.classList.remove('hidden-auth');
                register.classList.add('hidden-auth');
            } else {
                login.classList.add('hidden-auth');
                register.classList.remove('hidden-auth');
            }
        }
    </script>
</body>
</html>
